<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABIS — Unified Dashboard Shell (demo)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- Real ABIS stylesheets, single source of truth -->

<style>
  /* Demo-only: the product itself uses these tokens; this just sets the page frame. */
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; color: var(--text-primary); background: var(--bg-secondary); }
  .abis-form-grid { display: grid; gap: var(--space-4); }
  .abis-form-grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .abis-form-grid.three { grid-template-columns: repeat(3, minmax(0,1fr)); }
  .abis-field { display: grid; gap: var(--space-2); }
  .abis-field label { font-size: var(--text-sm); font-weight: 600; color: var(--text-secondary); }
  .panel-row { display: grid; grid-template-columns: 1.6fr 1fr; gap: var(--space-6); align-items: start; }
  @media (max-width: 900px){ .panel-row { grid-template-columns: 1fr; } }
  .mini-list { display: grid; gap: var(--space-3); margin: 0; padding: 0; list-style: none; }
  .mini-row { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); padding: var(--space-3) var(--space-4); border: 1px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-secondary); }
  .mini-row strong { font-size: var(--text-sm); }
  .mini-row small { color: var(--text-secondary); display: block; font-size: var(--text-xs); }
  .prog-line { display: grid; gap: var(--space-2); }
  .prog-line .prog-meta { display: flex; justify-content: space-between; font-size: var(--text-sm); }
  .prog-line .prog-meta span:last-child { color: var(--text-secondary); }
</style>
</head>
<body>

<div class="abis-shell">

  <!-- Mobile sticky bar (visible ≤1023px) -->
  <div class="abis-mobile-bar">
    <div class="abis-mobile-brand"><img src="images/brand/abis.png" alt="ABIS" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'abis-sidebar-mark',textContent:'AB'}))"><span data-brand>ABIS</span></div>
    <button class="abis-hamburger" type="button" aria-label="Open menu" aria-controls="abisSidebar" aria-expanded="false" onclick="abisToggleSidebar(true)">&#9776;</button>
  </div>
  <div class="abis-sidebar-backdrop" data-abis-backdrop onclick="abisToggleSidebar(false)"></div>

  <!-- Sidebar -->
  <aside class="abis-sidebar" id="abisSidebar" aria-label="Primary">
    <div class="abis-sidebar-logo">
      <img src="images/brand/abis.png" alt="ABIS" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'abis-sidebar-mark',textContent:'AB'}))">
      <div><strong data-brand>ABIS</strong><span>Workforce Portal</span></div>
    </div>
    <nav class="abis-nav" id="abisNav">
      <div class="abis-nav-label">Menu</div>
    </nav>
    <div class="abis-sidebar-user">
      <span class="abis-avatar" id="userInitials">AB</span>
      <div><strong id="userName">ABIS User</strong><span id="userRole">Portal</span></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="abis-main">
    <header class="abis-topbar">
      <div class="abis-topbar-titles">
        <nav class="abis-breadcrumb" aria-label="Breadcrumb">
          <a href="#">Portal</a><span>/</span><span id="crumb">Dashboard</span>
        </nav>
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSub">Overview of activity across your workspace.</p>
      </div>
      <div class="abis-topbar-actions">
        <button class="btn btn-secondary"><i class="fa-solid fa-arrow-down-to-line"></i> Export</button>
        <button class="btn btn-primary" id="primaryCta"><i class="fa-solid fa-plus"></i> New</button>
      </div>
    </header>

    <section class="abis-stat-grid" id="statGrid"></section>

    <div class="panel-row">
      <section class="abis-panel">
        <div class="abis-panel-head">
          <h2 id="tableTitle">Records</h2>
          <button class="btn btn-secondary btn-sm"><i class="fa-solid fa-filter"></i> Filter</button>
        </div>
        <div class="abis-table-wrap">
          <table class="abis-table">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="abis-panel">
        <div class="abis-panel-head"><h3 id="sideTitle">Progress</h3></div>
        <div class="mini-list" id="progressList"></div>
        <div class="abis-empty-state" style="margin-top:var(--space-5)">
          <span class="abis-empty-art"><i class="fa-regular fa-folder-open"></i></span>
          <strong>Nothing else queued</strong>
          <span>New items will appear here as they arrive.</span>
        </div>
      </section>
    </div>

    <section class="abis-panel">
      <div class="abis-panel-head"><h3>Quick entry</h3></div>
      <form class="abis-form-grid three" onsubmit="return false">
        <div class="abis-field"><label>Full name</label><input class="form-input" placeholder="e.g. Omar Al-Harbi"></div>
        <div class="abis-field"><label>Site</label>
          <select class="form-select"><option>Jubail</option><option>Yanbu</option><option>Ras Tanura</option></select>
        </div>
        <div class="abis-field"><label>Status</label>
          <select class="form-select"><option>Active</option><option>Pending</option><option>Draft</option></select>
        </div>
      </form>
    </section>
  </main>
</div>

function renderRole(key){
  var r = ROLES[key] || ROLES.tech;
  document.querySelectorAll('[data-brand]').forEach(function(el){ el.textContent = r.brand; });
  document.getElementById('userInitials').textContent = r.user.initials;
  document.getElementById('userName').textContent = r.user.name;
  document.getElementById('userRole').textContent = r.user.role;
  document.getElementById('crumb').textContent = r.crumb;
  document.getElementById('pageTitle').textContent = r.title + ' Dashboard';
  document.getElementById('pageSub').textContent = r.sub;
  document.getElementById('primaryCta').innerHTML = '<i class="fa-solid fa-plus"></i> ' + r.cta;
  document.getElementById('tableTitle').textContent = r.tableTitle;
  document.getElementById('sideTitle').textContent = r.sideTitle;

  // Nav
  var nav = document.getElementById('abisNav');
  nav.innerHTML = '<div class="abis-nav-label">Menu</div>';
  r.nav.forEach(function(item){
    var active = item[3] ? ' active' : '';
    var cur = item[3] ? ' aria-current="page"' : '';
    nav.insertAdjacentHTML('beforeend',
      '<a class="abis-nav-link'+active+'" href="#"'+cur+'><span class="abis-nav-icon"><i class="'+item[2]+'"></i></span><span>'+item[1]+'</span></a>');
  });

  // Stats
  var sg = document.getElementById('statGrid');
  sg.innerHTML = '';
  r.stats.forEach(function(s){
    var label=s[0], value=s[1], trend=s[2], dir=s[3], icon=s[4];
    var numeric = typeof value === 'number';
    var data = numeric ? ' data-value="'+value+'"' : '';
    var arrow = dir==='up'?'&#9650;':(dir==='down'?'&#9660;':(dir==='warning'?'&#9650;':''));
    var trendClass = dir==='warning' ? 'down' : dir;
    sg.insertAdjacentHTML('beforeend',
      '<article class="abis-stat-card abis-reveal">'+
        '<span class="abis-stat-label"><i class="'+icon+'"></i> '+label+'</span>'+
        '<span class="abis-stat-value"'+data+'>'+value+'</span>'+
        (trend?'<span class="abis-stat-trend '+(trendClass||'')+'">'+arrow+' '+trend+'</span>':'')+
      '</article>');
  });

  // Table
  var th = document.getElementById('tableHead'); th.innerHTML = '';
  r.cols.forEach(function(c){ th.insertAdjacentHTML('beforeend','<th>'+c+'</th>'); });
  var tb = document.getElementById('tableBody'); tb.innerHTML = '';
  r.rows.forEach(function(row){
    var cells = row.map(function(cell, i){
      if (i === row.length - 1) return '<td>'+badge(cell.charAt(0).toUpperCase()+cell.slice(1), cell)+'</td>';
      return '<td>'+cell+'</td>';
    }).join('');
    tb.insertAdjacentHTML('beforeend','<tr class="abis-reveal">'+cells+'</tr>');
  });

  // Progress
  var pl = document.getElementById('progressList'); pl.innerHTML = '';
  r.prog.forEach(function(p){
    pl.insertAdjacentHTML('beforeend',
      '<div class="prog-line"><div class="prog-meta"><span>'+p[0]+'</span><span>'+p[1]+'%</span></div>'+
      '<div class="abis-progress"><span data-progress="'+p[1]+'"></span></div></div>');
  });

  bindAnimations();
}

/* ---------- Shell behavior (mirrors abisShellScript) ---------- */
var REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!REDUCED) document.documentElement.classList.add('js-anim');

window.abisToggleSidebar = function(open, instant){
  var sb=document.getElementById('abisSidebar'), bd=document.querySelector('[data-abis-backdrop]'), btn=document.querySelector('.abis-hamburger');
  if(!sb||!bd) return;
  if(instant){ sb.classList.add('no-anim'); bd.classList.add('no-anim'); }
  sb.classList.toggle('open', open); bd.classList.toggle('open', open);
  if(btn) btn.setAttribute('aria-expanded', open?'true':'false');
  if(instant){ requestAnimationFrame(function(){ sb.classList.remove('no-anim'); bd.classList.remove('no-anim'); }); }
};
document.addEventListener('keydown', function(e){ if(e.key==='Escape') window.abisToggleSidebar(false, true); });

function animateCounter(el){
  var target=parseFloat(el.dataset.value); if(isNaN(target)) return;
  if(REDUCED){ el.textContent=target.toLocaleString(); return; }
  var dur=800, start=performance.now();
  (function up(t){ var p=Math.min((t-start)/dur,1), e=1-Math.pow(1-p,4);
    el.textContent=Math.round(target*e).toLocaleString(); if(p<1) requestAnimationFrame(up); })(start);
}
var io = ('IntersectionObserver' in window) ? new IntersectionObserver(function(entries){
  entries.forEach(function(en){ if(!en.isIntersecting) return; var el=en.target;
    if(el.matches('.abis-stat-value[data-value]')) animateCounter(el);
    if(el.matches('.abis-progress > span[data-progress]')) el.style.width=(el.dataset.progress||0)+'%';
    io.unobserve(el); }); },{threshold:0.3}) : null;

function bindAnimations(){
  var c=document.querySelectorAll('.abis-stat-value[data-value]'), b=document.querySelectorAll('.abis-progress > span[data-progress]');
  if(io){ c.forEach(function(el){io.observe(el);}); b.forEach(function(el){io.observe(el);}); }
  else { c.forEach(animateCounter); b.forEach(function(el){el.style.width=(el.dataset.progress||0)+'%';}); }
}

// Allow parent frame to switch roles
window.addEventListener('message', function(e){ if(e.data && e.data.abisRole) renderRole(e.data.abisRole); });

var params = new URLSearchParams(location.search);
renderRole(params.get('role') || 'tech');
