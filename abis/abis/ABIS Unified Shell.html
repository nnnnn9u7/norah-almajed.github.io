<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABIS — Unified Dashboard Shell</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0d1f2d; --navy2:#060f17; --orange:#e87d34; --line:rgba(255,255,255,.1);
    --ink:#e9eef3; --muted:rgba(233,238,243,.6);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0a141d;color:var(--ink);}
  .review{min-height:100vh;display:flex;flex-direction:column;}
  header.bar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:16px 22px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0d1f2d,#0a141d);}
  .bar h1{font-size:15px;font-weight:800;margin:0;letter-spacing:.02em;}
  .bar .sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .grp{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .grp .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-right:4px;}
  .pill{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);
    font:inherit;font-size:12px;font-weight:600;padding:8px 13px;border-radius:9px;cursor:pointer;
    transition:background .16s ease,border-color .16s ease,color .16s ease;}
  .pill:hover{background:rgba(255,255,255,.09);}
  .pill.active{background:var(--orange);border-color:var(--orange);color:#fff;}
  .spacer{flex:1;}
  .stage{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:26px;overflow:auto;
    background:
      radial-gradient(circle at 20% 0%, rgba(232,125,52,.10), transparent 38%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.015) 0 2px, transparent 2px 9px);}
  .device{position:relative;background:#fff;border-radius:14px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.45);transition:width .35s cubic-bezier(.23,1,.32,1);width:100%;max-width:100%;}
  .device.bp-375{width:375px;} .device.bp-768{width:768px;} .device.bp-1024{width:1024px;}
  .device.bp-1440{width:1440px;} .device.bp-full{width:100%;}
  .device .wlabel{position:absolute;top:8px;right:10px;z-index:5;background:rgba(13,31,45,.82);color:#fff;
    font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:6px;pointer-events:none;}
  iframe{width:100%;height:78vh;border:0;display:block;background:#fff;}
  @media (max-width:760px){ header.bar{padding:12px 14px;} .stage{padding:12px;} iframe{height:70vh;} }
</style>
</head>
<body>
<div class="review">
  <header class="bar">
    <div>
      <h1>ABIS · Unified Dashboard Shell</h1>
      <div class="sub">One sidebar, one shell, one card &amp; table system — across all 8 roles. Loads the real CSS.</div>
    </div>
    <div class="spacer"></div>
    <div class="grp" id="roleTabs">
      <span class="lab">Role</span>
    </div>
    <div class="grp" id="bpTabs">
      <span class="lab">Width</span>
    </div>
  </header>
  <div class="stage">
    <div class="device bp-full" id="device">
      <span class="wlabel" id="wlabel">Full width</span>
      <iframe id="frame" src="dashboard-demo.html?role=tech" title="ABIS dashboard demo"></iframe>
    </div>
  </div>
</div>

<script>
var ROLES = [
  ['tech','Tech Supervisor'],['hr','HR'],['manager','Manager'],['branch','Branch'],
  ['employee','Employee'],['applicant','Applicant'],['pm','Project Manager'],['admin','Admin']
];
var BPS = [['full','Full'],['1440','1440'],['1024','1024'],['768','768'],['375','375']];

var roleTabs=document.getElementById('roleTabs'), bpTabs=document.getElementById('bpTabs');
var frame=document.getElementById('frame'), device=document.getElementById('device'), wlabel=document.getElementById('wlabel');
var curRole='tech';

ROLES.forEach(function(r,i){
  var b=document.createElement('button'); b.className='pill'+(i===0?' active':''); b.textContent=r[1]; b.dataset.role=r[0];
  b.onclick=function(){ curRole=r[0];
    [].forEach.call(roleTabs.querySelectorAll('.pill'),function(p){p.classList.toggle('active',p===b);});
    // reload keeps animations fresh + respects width media queries
    frame.src='dashboard-demo.html?role='+r[0];
  };
  roleTabs.appendChild(b);
});

BPS.forEach(function(bp,i){
  var b=document.createElement('button'); b.className='pill'+(bp[0]==='full'?' active':''); b.textContent=bp[1]; b.dataset.bp=bp[0];
  b.onclick=function(){
    device.className='device bp-'+bp[0];
    [].forEach.call(bpTabs.querySelectorAll('.pill'),function(p){p.classList.toggle('active',p===b);});
    wlabel.textContent = bp[0]==='full' ? 'Full width' : bp[1]+' px';
  };
  bpTabs.appendChild(b);
});
</script>
</body>
</html>
